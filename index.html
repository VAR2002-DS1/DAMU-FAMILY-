<!DOCTYPE html>
<html>
<head>
  <title>Family Photos</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      color: white;

      background: linear-gradient(270deg, red, orange, yellow, green, blue, purple);
      background-size: 1200% 1200%;
      animation: rainbow 10s ease infinite;
    }

    @keyframes rainbow {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      margin-top: 20px;
    }

    img {
      width: 500px;
      max-width: 90%;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      padding: 12px 25px;
      margin: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      background: black;
      color: white;
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {transform: translateY(0); opacity: 1;}
      100% {transform: translateY(-120vh); opacity: 0;}
    }
  </style>
</head>

<body>

  <h1>My Family Photos 📸</h1>

  <img id="photo" src="photo1.jpg">

  <br>

  <button onclick="nextPhoto()">Next Photo ➡️</button>

  <script>
    let photos = ["photo1.jpg", "photo2.jpg"];
    let currentIndex = 0;

    function nextPhoto() {
      currentIndex++;

      if (currentIndex >= photos.length) {
        currentIndex = 0;
      }

      document.getElementById("photo").src = photos[currentIndex];
    }

    /* bubbles */
    for (let i = 0; i < 25; i++) {
      let bubble = document.createElement("div");
      bubble.classList.add("bubble");

      bubble.style.left = Math.random() * 100 + "vw";
      bubble.style.width = bubble.style.height = (20 + Math.random() * 40) + "px";
      bubble.style.animationDuration = (5 + Math.random() * 5) + "s";

      document.body.appendChild(bubble);
    }
  </script>

</body>
</html>

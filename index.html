<!DOCTYPE html>
<html>
<head>
  <title>Family Photos</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      color: white;

      /* FUN rainbow animated background */
      background: linear-gradient(270deg, red, orange, yellow, green, blue, purple);
      background-size: 1200% 1200%;
      animation: rainbow 12s ease infinite;
    }

    @keyframes rainbow {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    img {
      width: 300px;
      border-radius: 15px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    input {
      margin-top: 10px;
      position: relative;
      z-index: 2;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      position: relative;
      z-index: 2;
    }

    #nextBtn {
      background: #222;
      color: white;
    }

    /* FLOATING BUBBLES */
    .bubble {
      position: absolute;
      bottom: -100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>My Family Photos 📸</h1>

  <input type="file" id="fileInput" multiple>
  <br>

  <img id="photo" src="" alt="Upload a photo">

  <br>

  <button id="nextBtn">Next Photo ➡️</button>

  <script>
    let images = [];
    let currentIndex = 0;

    const fileInput = document.getElementById("fileInput");
    const photo = document.getElementById("photo");
    const nextBtn = document.getElementById("nextBtn");

    fileInput.addEventListener("change", function() {
      images = Array.from(fileInput.files);
      currentIndex = 0;
      showImage();
    });

    function showImage() {
      if (images.length > 0) {
        const file = images[currentIndex];
        photo.src = URL.createObjectURL(file);
      }
    }

    nextBtn.addEventListener("click", function() {
      if (images.length > 0) {
        currentIndex = (currentIndex + 1) % images.length;
        showImage();
      }
    });

    /* CREATE FUN FLOATING BUBBLES */
    for (let i = 0; i < 25; i++) {
      let bubble = document.createElement("div");
      bubble.classList.add("bubble");

      bubble.style.left = Math.random() * 100 + "vw";
      bubble.style.width = bubble.style.height = (20 + Math.random() * 40) + "px";
      bubble.style.animationDuration = (5 + Math.random() * 5) + "s";

      document.body.appendChild(bubble);
    }
  </script>

</body>
</html>

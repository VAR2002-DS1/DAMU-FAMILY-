<!DOCTYPE html>
<html>
<head>
  <title>Family Photos</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      text-align: center;
      color: white;

      background: linear-gradient(270deg, red, orange, yellow, green, blue, purple);
      background-size: 1200% 1200%;
      animation: rainbow 10s ease infinite;
    }

    @keyframes rainbow {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      margin-top: 20px;
    }

    img {
      width: 500px;   /* BIGGER IMAGE */
      max-width: 90%;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      margin-top: 10px;
    }

    button {
      padding: 12px 25px;
      margin: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      background: black;
      color: white;
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {transform: translateY(0); opacity: 1;}
      100% {transform: translateY(-120vh); opacity: 0;}
    }
  </style>
</head>

<body>

  <h1>My Family Photos 📸</h1>

  <div class="container">
    <input type="file" id="fileInput" multiple>
    <br>

    <img id="photo" src="" alt="Upload photos">

    <br>

    <button id="nextBtn">Next Photo ➡️</button>
  </div>

  <script>
    let images = [];
    let currentIndex = 0;

    const fileInput = document.getElementById("fileInput");
    const photo = document.getElementById("photo");
    const nextBtn = document.getElementById("nextBtn");

    fileInput.addEventListener("change", function() {
      images = Array.from(this.files);
      currentIndex = 0;

      if (images.length > 0) {
        showImage();
      }
    });

    function showImage() {
      const file = images[currentIndex];
      photo.src = URL.createObjectURL(file);
    }

    nextBtn.addEventListener("click", function() {
      if (images.length === 0) return;

      currentIndex++;

      if (currentIndex >= images.length) {
        currentIndex = 0; // loop back
      }

      showImage();
    });

    /* BUBBLES */
    for (let i = 0; i < 25; i++) {
      let bubble = document.createElement("div");
      bubble.classList.add("bubble");

      bubble.style.left = Math.random() * 100 + "vw";
      bubble.style.width = bubble.style.height = (20 + Math.random() * 40) + "px";
      bubble.style.animationDuration = (5 + Math.random() * 5) + "s";

      document.body.appendChild(bubble);
    }
  </script>

</body>
</html>
